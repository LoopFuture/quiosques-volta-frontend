openapi: 3.0.0
paths:
  '/api/v1/admin/machines':
    get:
      operationId: AdminRvmMachinesController_listMachines_v1
      parameters: []
      responses:
        '200':
          description: Machines returned successfully.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/AdminMachineListResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '403':
          description: Authenticated user is not allowed to manage machines.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: List all machines
      tags:
        - Admin Machines
    post:
      operationId: AdminRvmMachinesController_createMachine_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/AdminCreateMachineRequestDto'
      responses:
        '201':
          description: Machine created successfully.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/AdminCreateMachineResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '403':
          description: Authenticated user is not allowed to manage machines.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '409':
          description: Machine serial number already exists.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '422':
          description: Request payload is invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiValidationErrorResponseDto'
      security:
        - bearer: []
      summary: Create a machine record
      tags:
        - Admin Machines
  '/api/v1/admin/machines/{machineId}/enroll':
    post:
      operationId: AdminRvmMachinesController_createEnrollmentToken_v1
      parameters:
        - name: machineId
          required: true
          in: path
          description: Opaque machine identifier returned when the machine record was created.
          schema:
            example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
            type: string
      responses:
        '200':
          description: Enrollment token issued successfully.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/AdminCreateEnrollmentTokenResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '403':
          description: Authenticated user is not allowed to manage machines.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '404':
          description: Machine could not be found.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Issue a new enrollment token for a machine
      tags:
        - Admin Machines
  '/api/v1/admin/machines/{machineId}':
    get:
      operationId: AdminRvmMachinesController_getMachine_v1
      parameters:
        - name: machineId
          required: true
          in: path
          description: Opaque machine identifier returned when the machine record was created.
          schema:
            example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
            type: string
      responses:
        '200':
          description: Machine returned successfully.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/AdminMachineDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '403':
          description: Authenticated user is not allowed to manage machines.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '404':
          description: Machine could not be found.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Get machine details
      tags:
        - Admin Machines
    patch:
      operationId: AdminRvmMachinesController_updateMachine_v1
      parameters:
        - name: machineId
          required: true
          in: path
          description: Opaque machine identifier returned when the machine record was created.
          schema:
            example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/AdminUpdateMachineRequestDto'
      responses:
        '200':
          description: Machine updated successfully.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/AdminMachineDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '403':
          description: Authenticated user is not allowed to manage machines.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '404':
          description: Machine could not be found.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '422':
          description: Machine patch payload is invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiValidationErrorResponseDto'
      security:
        - bearer: []
      summary: Update machine details
      tags:
        - Admin Machines
    delete:
      operationId: AdminRvmMachinesController_deleteMachine_v1
      parameters:
        - name: machineId
          required: true
          in: path
          description: Opaque machine identifier returned when the machine record was created.
          schema:
            example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
            type: string
      responses:
        '204':
          description: Machine deleted successfully.
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '403':
          description: Authenticated user is not allowed to manage machines.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '404':
          description: Machine could not be found.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '409':
          description: Machine cannot be deleted because it is still referenced by transaction history.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Delete a machine
      tags:
        - Admin Machines
  '/api/v1/health':
    get:
      operationId: HealthController_getHealth_v1
      parameters: []
      responses:
        '200':
          description: Service health details.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/HealthResponseDto'
      summary: Get service health
      tags:
        - Health
  '/api/v1/health/ready':
    get:
      operationId: HealthController_getReadiness_v1
      parameters: []
      responses:
        '200':
          description: Service is ready to handle requests.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ReadinessSuccessResponseDto'
        '503':
          description: Service is not ready because a dependency is unavailable.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ReadinessFailureResponseDto'
      summary: Get service readiness
      tags:
        - Health
  '/api/v1/barcode':
    get:
      operationId: BarcodeController_getBarcode_v1
      parameters: []
      responses:
        '200':
          description: Returns the authenticated user's active pairing barcode, or creates a new one when none is still valid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/BarcodeResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '500':
          description: Barcode pairing session could not be created.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Get an active barcode pairing session
      tags:
        - Barcode
  '/api/v1/home':
    get:
      operationId: HomeController_getHome_v1
      parameters: []
      responses:
        '200':
          description: Aggregated Home screen payload for the authenticated user.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/HomeResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '500':
          description: Home payload could not be loaded.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Fetch Home screen data
      tags:
        - Home
  '/api/v1/profile':
    get:
      operationId: ProfileController_getProfile_v1
      parameters: []
      responses:
        '200':
          description: Full profile details for the authenticated user.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ProfileResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '500':
          description: Profile could not be loaded.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Get the authenticated profile
      tags:
        - Profile
    patch:
      operationId: ProfileController_patchProfile_v1
      parameters: []
      requestBody:
        required: true
        description: At least one top-level profile section must be provided.
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/ProfilePatchRequestDto'
      responses:
        '200':
          description: Updated full profile details.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ProfileResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '409':
          description: Profile update conflicts with existing data.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '422':
          description: Profile patch payload is invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiValidationErrorResponseDto'
        '500':
          description: Profile could not be updated.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Patch the authenticated profile
      tags:
        - Profile
  '/api/v1/provisioning/certificates':
    post:
      operationId: ProvisioningController_issueCertificate_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/ProvisioningCertificateRequestDto'
      responses:
        '201':
          description: Machine certificate issued successfully.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ProvisioningCertificateResponseDto'
        '400':
          description: Certificate signing request is invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '401':
          description: Enrollment token is invalid or expired.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '422':
          description: Request payload is invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiValidationErrorResponseDto'
        '500':
          description: Certificate signing service is not configured correctly.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      summary: Exchange an enrollment token and CSR for a client certificate
      tags:
        - Provisioning
  '/api/v1/rvm/pairing':
    post:
      operationId: RvmController_pair_v1
      parameters: []
      requestBody:
        required: true
        description: QR reference scanned from the mobile app pairing screen.
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/PairingRequestDto'
      responses:
        '200':
          description: Transaction session opened for the authenticated RVM machine.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/PairingResponseDto'
        '400':
          description: Request payload is invalid or the QR reference cannot be consumed.
          content:
            application/json:
              schema:
                oneOf:
                  - '$ref': '#/components/schemas/RvmValidationErrorResponseDto'
                  - '$ref': '#/components/schemas/RvmErrorResponseDto'
        '401':
          description: Machine identity is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/RvmErrorResponseDto'
      security:
        - mutual-tls: []
      summary: Consume a pairing QR and open a transaction session
      tags:
        - RVM
  '/api/v1/rvm/transactions/{transactionSessionId}':
    post:
      operationId: RvmController_registerTransactionResult_v1
      parameters:
        - name: transactionSessionId
          required: true
          in: path
          description: Open transaction session identifier returned by the pairing endpoint.
          schema:
            type: string
      requestBody:
        required: true
        description: Final RVM transaction totals for the open machine session.
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/RegisterTransactionResultRequestDto'
      responses:
        '200':
          description: Transaction result accepted and credited to the paired user's wallet.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/RegisterTransactionResultResponseDto'
        '400':
          description: Transaction session or request payload is invalid.
          content:
            application/json:
              schema:
                oneOf:
                  - '$ref': '#/components/schemas/RvmValidationErrorResponseDto'
                  - '$ref': '#/components/schemas/RvmErrorResponseDto'
        '401':
          description: Machine identity is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/RvmErrorResponseDto'
        '404':
          description: Transaction session was not found for the authenticated machine.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/RvmErrorResponseDto'
        '409':
          description: Transaction session is expired or has already been credited.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/RvmErrorResponseDto'
      security:
        - mutual-tls: []
      summary: Register the final RVM transaction result and credit the wallet
      tags:
        - RVM
  '/api/v1/wallet/transfers':
    post:
      operationId: WalletController_createWalletTransfer_v1
      parameters:
        - name: Idempotency-Key
          in: header
          description: Idempotency key used to safely retry transfer creation.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/CreateWalletTransferRequestDto'
      responses:
        '202':
          description: Transfer accepted for asynchronous processing.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/CreateWalletTransferResponseDto'
        '400':
          description: Request is missing a valid Idempotency-Key header.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '409':
          description: Transfer request conflicts with current wallet state.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '422':
          description: Transfer request payload is invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiValidationErrorResponseDto'
        '500':
          description: Transfer could not be created.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Create a wallet payout transfer
      tags:
        - Wallet
  '/api/v1/wallet':
    get:
      operationId: WalletController_getWallet_v1
      parameters: []
      responses:
        '200':
          description: Wallet summary for the authenticated user.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/WalletResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '500':
          description: Wallet summary could not be loaded.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Get the authenticated wallet summary
      tags:
        - Wallet
  '/api/v1/wallet/transactions':
    get:
      operationId: WalletController_listWalletTransactions_v1
      parameters:
        - name: cursor
          required: false
          in: query
          description: Opaque pagination cursor returned by the previous wallet transaction page.
          schema:
            example: eyJpZCI6IjExMTExMTExLTExMTEtNDExMS04MTExLTExMTExMTExMTExMSIsIm9jY3VycmVkQXQiOiIyMDI0LTAyLTEwVDA5OjMwOjAwLjAwMFoifQ
            type: string
        - name: limit
          required: false
          in: query
          description: Maximum number of transactions to return in a single page.
          schema:
            minimum: 1
            maximum: 100
            example: 20
            type: number
        - name: status
          required: false
          in: query
          description: Filter results by transfer lifecycle status.
          schema:
            type: string
            enum:
              - pending
              - processing
              - completed
              - failed
              - cancelled
        - name: type
          required: false
          in: query
          description: Filter results by wallet transaction type.
          schema:
            type: string
            enum:
              - credit
              - transfer_debit
              - adjustment
      responses:
        '200':
          description: Paginated wallet transaction list.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/WalletTransactionListResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '422':
          description: Transaction query parameters are invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiValidationErrorResponseDto'
        '500':
          description: Wallet transactions could not be loaded.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: List wallet transactions
      tags:
        - Wallet
  '/api/v1/wallet/transactions/{transactionId}':
    get:
      operationId: WalletController_getWalletTransaction_v1
      parameters:
        - name: transactionId
          required: true
          in: path
          description: Wallet transaction identifier.
          schema:
            type: string
      responses:
        '200':
          description: Wallet transaction detail.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/WalletTransactionResponseDto'
        '400':
          description: Transaction id is malformed.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '401':
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '404':
          description: Wallet transaction was not found.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
        '500':
          description: Wallet transaction could not be loaded.
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/ApiErrorResponseDto'
      security:
        - bearer: []
      summary: Get a wallet transaction by id
      tags:
        - Wallet
info:
  title: Volta Backend API
  description: OpenAPI documentation for the Volta backend.
  version: 1.1.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    mutual-tls:
      description: Verified mutual TLS client certificate forwarded by ingress.
      type: mutualTLS
    bearer:
      scheme: bearer
      bearerFormat: JWT
      description: Bearer access token.
      in: header
      name: Authorization
      type: http
  schemas:
    AdminMachineCertificateDto:
      type: object
      properties:
        certificateSerialNumber:
          type: string
          example: 16c086c3af2dc0fa4b942f930b8b91dd
        fingerprintSha256:
          type: string
          example: 9f1d5f8d31ef4ecab8dbac4c0b5c4c45fc5f6cadc94ef2f96a23ed4fd76742f6
        issuerCommonName:
          type: string
          example: Volta Machine CA
        subjectCommonName:
          type: string
          example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
        validFrom:
          type: string
          example: '2026-03-24T12:10:00.000Z'
        validTo:
          type: string
          example: '2027-03-24T12:10:00.000Z'
      required:
        - certificateSerialNumber
        - fingerprintSha256
        - issuerCommonName
        - subjectCommonName
        - validFrom
        - validTo
    AdminMachineDto:
      type: object
      properties:
        id:
          type: string
          example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
        serialNumber:
          type: string
          example: RVM-PT-0001
        displayName:
          type: object
          example: Lisbon Mall Kiosk 1
          nullable: true
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        createdAt:
          type: string
          example: '2026-03-24T12:10:00.000Z'
        updatedAt:
          type: string
          example: '2026-03-24T12:10:00.000Z'
        activeCertificate:
          nullable: true
          allOf:
            - '$ref': '#/components/schemas/AdminMachineCertificateDto'
      required:
        - id
        - serialNumber
        - status
        - createdAt
        - updatedAt
        - activeCertificate
    AdminMachineListResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            '$ref': '#/components/schemas/AdminMachineDto'
      required:
        - items
    ApiErrorDetailsDto:
      type: object
      properties:
        code:
          type: string
          example: unauthorized
        message:
          type: string
          example: Authentication required or invalid token.
        requestId:
          type: string
          example: req_1234567890abcdef
      required:
        - code
        - message
        - requestId
    ApiErrorResponseDto:
      type: object
      properties:
        error:
          '$ref': '#/components/schemas/ApiErrorDetailsDto'
      required:
        - error
    AdminCreateMachineRequestDto:
      type: object
      properties:
        serialNumber:
          type: string
          example: RVM-PT-0001
          maxLength: 128
          pattern: '^[A-Z0-9._-]+$'
      required:
        - serialNumber
    AdminCreateMachineResponseDto:
      type: object
      properties:
        id:
          type: string
          example: rvm_01JVQZX2E5PKR43YQWQ9T7HB8K
      required:
        - id
    ApiValidationIssueDto:
      type: object
      properties:
        code:
          type: string
          example: invalid_format
        field:
          type: string
          example: personal.email
        message:
          type: string
          example: email must be an email
      required:
        - code
        - field
        - message
    ApiValidationErrorResponseDto:
      type: object
      properties:
        error:
          '$ref': '#/components/schemas/ApiErrorDetailsDto'
        issues:
          type: array
          items:
            '$ref': '#/components/schemas/ApiValidationIssueDto'
      required:
        - error
        - issues
    AdminCreateEnrollmentTokenResponseDto:
      type: object
      properties:
        token:
          type: string
          example: boot_01JVQZYG7PKR43YQWQ9T7HB8K1
      required:
        - token
    AdminUpdateMachineRequestDto:
      type: object
      properties:
        displayName:
          type: object
          example: Lisbon Mall Kiosk 1
          maxLength: 120
          nullable: true
        status:
          type: string
          enum:
            - active
            - inactive
          example: inactive
    HealthResponseDto:
      type: object
      properties:
        service:
          type: string
