openapi: 3.0.3
info:
  title: Volta Mobile Backend API
  version: 1.1.0
  description:
    'Simplified production-ready v1 contract for a greenfield backend serving the Expo mobile app.


    Key decisions for v1:

    - keep one aggregated endpoint for the Home screen

    - do not add a separate bootstrap endpoint yet

    - expose locations, not a map screen projection

    - use one profile patch endpoint instead of several subsection-specific endpoints

    - keep transactions and notifications paginated

    - require idempotency for transfer creation

    - add per-installation Expo push registration for user-specific notifications

    '
servers:
  - url: https://api.volta.example.com
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Home
  - name: Profile
  - name: Wallet
  - name: Notifications
  - name: Push
  - name: Barcode
  - name: Locations
paths:
  /home:
    get:
      tags:
        - Home
      summary: Fetch Home screen data
      operationId: getHome
      description:
        'Aggregated backend-for-frontend projection for the Home screen only.

        This endpoint is the canonical source for user-facing stats shown on Home.

        '
      responses:
        '200':
          description: Home payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /profile:
    get:
      tags:
        - Profile
      summary: Fetch profile data
      operationId: getProfile
      responses:
        '200':
          description: Profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
        - Profile
      summary: Update mutable profile data
      operationId: patchProfile
      description: 'Partial update for backend-owned profile fields.

        Client-only settings such as device biometrics and OS push permission are intentionally excluded.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfilePatchRequest'
      responses:
        '200':
          description: Updated profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /wallet:
    get:
      tags:
        - Wallet
      summary: Fetch wallet summary
      operationId: getWallet
      description: 'Returns the wallet landing screen summary.

        Transaction history is fetched separately and paginated.

        '
      responses:
        '200':
          description: Wallet payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /wallet/transactions:
    get:
      tags:
        - Wallet
      summary: List wallet transactions
      operationId: listWalletTransactions
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - credit
              - transfer_debit
              - adjustment
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - processing
              - completed
              - failed
              - cancelled
      responses:
        '200':
          description: Paginated transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletTransactionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /wallet/transactions/{transactionId}:
    get:
      tags:
        - Wallet
      summary: Fetch transaction detail
      operationId: getWalletTransaction
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletTransactionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /wallet/transfers:
    post:
      tags:
        - Wallet
      summary: Create payout transfer
      operationId: createWalletTransfer
      description:
        "Creates a payout transfer from the available wallet balance to the user's saved payout account.

        This operation is asynchronous and must be sent with an idempotency key.

        "
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '202':
          description: Transfer accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /notifications:
    get:
      tags:
        - Notifications
      summary: List notifications
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - all
              - unread
            default: all
      responses:
        '200':
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Notifications
      summary: Clear all notifications for the current user
      description: Soft-deletes or archives all notifications for the authenticated user so they no longer appear in the inbox view.
      operationId: clearAllNotifications
      responses:
        '200':
          description: Notifications cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearNotificationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /notifications/read:
    post:
      tags:
        - Notifications
      summary: Mark notifications as read
      operationId: markNotificationsRead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkNotificationsReadRequest'
      responses:
        '200':
          description: Updated unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkNotificationsReadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /push/installations/{installationId}:
    put:
      tags:
        - Push
      summary: Register or update the current app installation for push delivery
      operationId: upsertPushInstallation
      description:
        'Idempotent per-installation registration for Expo push delivery.

        Use a client-generated installationId persisted locally on the device.

        Call this after login and whenever the Expo push token changes.'
      parameters:
        - $ref: '#/components/parameters/InstallationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPushInstallationRequest'
      responses:
        '200':
          description: Push installation registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushInstallationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Push
      summary: Unregister the current app installation from push delivery
      operationId: deletePushInstallation
      description:
        'Idempotently removes or deactivates the push registration for this installation.

        Call on logout, account switch, or when notification permission is revoked.'
      parameters:
        - $ref: '#/components/parameters/InstallationId'
      responses:
        '204':
          description: Push installation unregistered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /barcode:
    get:
      tags:
        - Barcode
      summary: Fetch current member barcode
      operationId: getBarcode
      responses:
        '200':
          description: Barcode payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarcodeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/locations/collection-points:
    get:
      tags:
        - Locations
      summary: List collection points
      operationId: listCollectionPoints
      description: 'Returns collection-point data for the Map screen.

        The mobile client is responsible for map rendering, pin styling, clustering, and viewport behavior.

        '
      parameters:
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: 0.1
            maximum: 100
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Collection point list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionPointListResponse'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque pagination cursor.
    PageSize:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key supplied by the client to safely retry transfer creation.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    InstallationId:
      name: installationId
      in: path
      required: true
      description: Stable UUID generated once by the client and persisted per app installation.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Money:
      type: object
      additionalProperties: false
      required:
        - currency
        - amountMinor
      properties:
        currency:
          type: string
          enum:
            - EUR
        amountMinor:
          type: integer
          description: Amount in minor units. For EUR, cents.
          example: 470
    PageInfo:
      type: object
      additionalProperties: false
      required:
        - hasNextPage
      properties:
        nextCursor:
          type: string
          nullable: true
        hasNextPage:
          type: boolean
    Error:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: One or more fields are invalid.
        requestId:
          type: string
          example: req_01HXYZABC123
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/Error'
    ValidationIssue:
      type: object
      additionalProperties: false
      required:
        - field
        - code
        - message
      properties:
        field:
          type: string
          example: personal.email
        code:
          type: string
          example: invalid_format
        message:
          type: string
          example: Must be a valid email address.
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - issues
      properties:
        error:
          $ref: '#/components/schemas/Error'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    UserStats:
      type: object
      additionalProperties: false
      required:
        - creditsEarned
        - returnedPackagesCount
        - completedTransfersCount
        - processingTransfersCount
      properties:
        creditsEarned:
          $ref: '#/components/schemas/Money'
        returnedPackagesCount:
          type: integer
          minimum: 0
        completedTransfersCount:
          type: integer
          minimum: 0
        processingTransfersCount:
          type: integer
          minimum: 0
    TransferEligibility:
      type: object
      additionalProperties: false
      required:
        - canTransfer
        - minimumTransfer
        - maximumTransfer
      properties:
        canTransfer:
          type: boolean
        reason:
          type: string
          nullable: true
          example: Insufficient balance.
        minimumTransfer:
          $ref: '#/components/schemas/Money'
        maximumTransfer:
          $ref: '#/components/schemas/Money'
    ActivityPreview:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - status
        - occurredAt
        - title
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - credit
            - transfer_debit
            - adjustment
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
            - cancelled
        occurredAt:
          type: string
          format: date-time
        title:
          type: string
          example: Pingo Doce - Afragide
        subtitle:
          type: string
          nullable: true
          example: 6 packages returned
        amount:
          $ref: '#/components/schemas/Money'
    HomeGreeting:
      type: object
      additionalProperties: false
      required:
        - displayName
        - memberSince
      properties:
        displayName:
          type: string
          example: Joao Ferreira
        memberSince:
          type: string
          format: date-time
    HomeResponse:
      type: object
      additionalProperties: false
      required:
        - greeting
        - walletBalance
        - stats
        - transferEligibility
        - recentActivity
        - unreadNotificationsCount
      properties:
        greeting:
          $ref: '#/components/schemas/HomeGreeting'
        walletBalance:
          $ref: '#/components/schemas/Money'
        stats:
          $ref: '#/components/schemas/UserStats'
        transferEligibility:
          $ref: '#/components/schemas/TransferEligibility'
        recentActivity:
          type: array
          items:
            $ref: '#/components/schemas/ActivityPreview'
        unreadNotificationsCount:
          type: integer
          minimum: 0
    ProfilePersonal:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - nif
        - phoneNumber
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: Joao Ferreira
        email:
          type: string
          format: email
          example: joao.ferreira@sdr.pt
        nif:
          type: string
          pattern: ^\d{9}$
          description: Portuguese NIF in canonical digits-only form.
          example: '234567890'
        phoneNumber:
          type: string
          pattern: ^\+[1-9]\d{7,14}$
          description: Phone number in canonical E.164 format.
          example: '+351912345678'
    PayoutAccount:
      type: object
      additionalProperties: false
      required:
        - ibanMasked
        - spinEnabled
      properties:
        ibanMasked:
          type: string
          example: PT50************90123
        spinEnabled:
          type: boolean
    PayoutAccountInput:
      type: object
      additionalProperties: false
      required:
        - iban
        - spinEnabled
      properties:
        iban:
          type: string
          pattern: ^[A-Z]{2}[0-9]{2}[A-Z0-9]{11,30}$
          description: Canonical IBAN with no spaces.
          example: PT5000031234567890123
        spinEnabled:
          type: boolean
    ProfilePreferences:
      type: object
      additionalProperties: false
      required:
        - alertsEnabled
        - alertsEmail
      properties:
        alertsEnabled:
          type: boolean
        alertsEmail:
          type: string
          format: email
    Onboarding:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - not_started
            - in_progress
            - completed
        completedAt:
          type: string
          format: date-time
          nullable: true
    ProfileResponse:
      type: object
      additionalProperties: false
      required:
        - memberSince
        - onboarding
        - personal
        - payoutAccount
        - preferences
        - stats
      properties:
        memberSince:
          type: string
          format: date-time
        onboarding:
          $ref: '#/components/schemas/Onboarding'
        personal:
          $ref: '#/components/schemas/ProfilePersonal'
        payoutAccount:
          $ref: '#/components/schemas/PayoutAccount'
        preferences:
          $ref: '#/components/schemas/ProfilePreferences'
        stats:
          $ref: '#/components/schemas/UserStats'
    ProfilePatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        personal:
          $ref: '#/components/schemas/ProfilePersonalPatch'
        payoutAccount:
          $ref: '#/components/schemas/PayoutAccountInput'
        preferences:
          $ref: '#/components/schemas/ProfilePreferencesPatch'
    ProfilePersonalPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        email:
          type: string
          format: email
        nif:
          type: string
          pattern: ^\d{9}$
        phoneNumber:
          type: string
          pattern: ^\+[1-9]\d{7,14}$
    ProfilePreferencesPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        alertsEnabled:
          type: boolean
        alertsEmail:
          type: string
          format: email
    WalletResponse:
      type: object
      additionalProperties: false
      required:
        - balance
        - stats
        - transferEligibility
        - recentTransactions
      properties:
        balance:
          $ref: '#/components/schemas/Money'
        stats:
          $ref: '#/components/schemas/UserStats'
        transferEligibility:
          $ref: '#/components/schemas/TransferEligibility'
        recentTransactions:
          type: array
          items:
            $ref: '#/components/schemas/ActivityPreview'
    CreditDetails:
      type: object
      additionalProperties: false
      required:
        - locationName
        - packageCount
      properties:
        locationName:
          type: string
        packageCount:
          type: integer
          minimum: 0
    TransferDetails:
      type: object
      additionalProperties: false
      required:
        - requestedAt
      properties:
        requestedAt:
          type: string
          format: date-time
        expectedArrivalAt:
          type: string
          format: date-time
          nullable: true
        payoutAccount:
          $ref: '#/components/schemas/PayoutAccount'
        failureReason:
          type: string
          nullable: true
    WalletTransaction:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - status
        - occurredAt
        - amount
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - credit
            - transfer_debit
            - adjustment
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
            - cancelled
        occurredAt:
          type: string
          format: date-time
        amount:
          $ref: '#/components/schemas/Money'
        creditDetails:
          $ref: '#/components/schemas/CreditDetails'
        transferDetails:
          $ref: '#/components/schemas/TransferDetails'
        description:
          type: string
          nullable: true
    WalletTransactionResponse:
      type: object
      additionalProperties: false
      required:
        - transaction
      properties:
        transaction:
          $ref: '#/components/schemas/WalletTransaction'
    WalletTransactionListResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WalletTransaction'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    CreateTransferRequest:
      type: object
      additionalProperties: false
      required:
        - amount
      properties:
        amount:
          $ref: '#/components/schemas/Money'
    CreateTransferResponse:
      type: object
      additionalProperties: false
      required:
        - transferId
        - status
      properties:
        transferId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - processing
        createdAt:
          type: string
          format: date-time
        balanceAfter:
          $ref: '#/components/schemas/Money'
    Notification:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - body
        - createdAt
        - read
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
        type:
          type: string
          enum:
            - wallet
            - transfer
            - system
        relatedResourceId:
          type: string
          nullable: true
    NotificationListResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - unreadCount
        - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        unreadCount:
          type: integer
          minimum: 0
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    MarkNotificationsReadRequest:
      type: object
      additionalProperties: false
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        markAll:
          type: boolean
          default: false
      oneOf:
        - required:
            - ids
        - required:
            - markAll
    MarkNotificationsReadResponse:
      type: object
      additionalProperties: false
      required:
        - unreadCount
      properties:
        unreadCount:
          type: integer
          minimum: 0
    ClearNotificationsResponse:
      type: object
      additionalProperties: false
      required:
        - clearedCount
        - unreadCount
      properties:
        clearedCount:
          type: integer
          minimum: 0
        unreadCount:
          type: integer
          minimum: 0
          description: Will normally be 0 after a successful clear operation.
    BarcodeResponse:
      type: object
      additionalProperties: false
      required:
        - reference
        - expiresAt
      properties:
        reference:
          type: string
          example: VF-0001-RTM-2026
        expiresAt:
          type: string
          format: date-time
    CollectionPoint:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - coordinates
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - active
            - temporarily_unavailable
            - offline
        coordinates:
          type: object
          additionalProperties: false
          required:
            - lat
            - lng
          properties:
            lat:
              type: number
