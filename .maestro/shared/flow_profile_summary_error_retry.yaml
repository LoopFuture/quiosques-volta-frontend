appId: com.voltafrontend.app
---
- runFlow:
    file: ../shared/ensure_ready_user.yaml

- openLink: 'voltafrontend:///profile/summary?__e2eQueryState=error'

- extendedWaitUntil:
    visible:
      id: profile-summary-screen-error-state
    timeout: 30000
- tapOn:
    id: profile-summary-screen-error-state-retry-button
- extendedWaitUntil:
    visible:
      id: profile-summary-screen
    timeout: 30000
