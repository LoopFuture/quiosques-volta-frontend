- runFlow:
    file: ../shared/launch_clear_state.yaml
- runFlow:
    file: ../shared/keycloak_login_steps.yaml

# If this user still requires profile setup, complete it (includes enabling PIN=1234).
- extendedWaitUntil:
    visible:
      id: profile-setup-screen
    timeout: 15000
    optional: true
- runFlow:
    when:
      visible:
        id: profile-setup-screen
    file: ../shared/profile_setup_happy_path.yaml

# Ensure we are in the protected app.
- extendedWaitUntil:
    visible:
      id: home-dashboard-screen
    timeout: 90000

# Relaunch twice:
# - first relaunch consumes the post-login lock grace period without locking
# - second relaunch should show the unlock screen (PIN enabled + bypass consumed)
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: home-dashboard-screen
    timeout: 60000

- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: auth-unlock-screen
    timeout: 60000

- tapOn:
    id: auth-pin-key-1
- tapOn:
    id: auth-pin-key-2
- tapOn:
    id: auth-pin-key-3
- tapOn:
    id: auth-pin-key-4

- extendedWaitUntil:
    visible:
      id: home-dashboard-screen
    timeout: 60000
