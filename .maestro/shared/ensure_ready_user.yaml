appId: com.voltafrontend.app
---
- launchApp

# If we landed on auth, sign in.
- extendedWaitUntil:
    visible:
      id: auth-screen
    timeout: 4000
    optional: true
- runFlow:
    when:
      visible:
        id: auth-screen
    file: ../shared/keycloak_login_steps.yaml

# Wait for the main app.
- extendedWaitUntil:
    visible:
      id: home-dashboard-screen
    timeout: 90000
