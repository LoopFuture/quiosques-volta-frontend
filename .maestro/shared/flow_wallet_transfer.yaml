appId: com.voltafrontend.app
---
- runFlow:
    file: ../shared/ensure_ready_user.yaml
- runFlow:
    file: ../shared/go_tab_wallet.yaml

- tapOn:
    id: wallet-overview-transfer-button

- extendedWaitUntil:
    visible:
      id: wallet-transfer-screen
    timeout: 30000
- assertVisible:
    id: wallet-transfer-review-card

- tapOn:
    id: wallet-transfer-amount-input
- inputText: '1,00'
- hideKeyboard:
    optional: true

- tapOn:
    id: wallet-transfer-submit-button

# Success should route to a movement detail screen.
- extendedWaitUntil:
    visible:
      id: wallet-movement-detail-screen
    timeout: 90000
- assertVisible:
    id: wallet-movement-detail-receipt-card
